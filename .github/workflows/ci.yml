name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend — test & build
    runs-on: self-hosted        # <-- gira sul tuo PC Windows

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ci_secret
          RESEND_API_KEY: re_placeholder
          GROQ_API_KEY: placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Build
        run: npm run build

  build-frontend:
    name: Frontend — build
    runs-on: self-hosted

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
